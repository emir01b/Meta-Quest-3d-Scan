<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaScan — 3D Model Viewer</title>
    <meta name="description" content="View and export 3D scanned models from Meta Quest 3S">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #080810;
            --bg-secondary: #0f0f1a;
            --bg-card: #16162a;
            --bg-hover: #1e1e3a;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --text: #f0f0f8;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.07);
            --success: #34d399;
            --warning: #fbbf24;
            --error: #f87171;
            --gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            --glass: rgba(16, 16, 30, 0.85);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ====== HEADER ====== */
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 52px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 10px; }
        .logo svg { width: 26px; height: 26px; }
        .logo h1 {
            font-size: 15px; font-weight: 600;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span { font-size: 10px; color: var(--text-muted); margin-left: 8px; }

        .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

        .conn-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-muted);
        }
        .conn-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--error);
        }
        .conn-badge.connected .conn-dot {
            background: var(--success);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ====== SIDEBAR ====== */
        .sidebar {
            position: fixed; top: 52px; left: 0;
            width: 280px; height: calc(100vh - 52px);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto; z-index: 50;
        }

        .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .section h3 {
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-muted); margin-bottom: 10px;
        }

        /* Session items */
        .session {
            padding: 8px 10px; border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
            margin-bottom: 3px; border: 1px solid transparent;
            font-size: 12px;
        }
        .session:hover { background: var(--bg-hover); border-color: var(--border); }
        .session.active { background: rgba(99,102,241,0.12); border-color: var(--accent); }
        .session .name { font-weight: 500; color: var(--text); }
        .session .meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
            padding: 7px 14px; border-radius: 6px;
            font-size: 12px; font-weight: 500; font-family: inherit;
            cursor: pointer; transition: all 0.15s;
            border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text);
        }
        .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
        .btn-primary { background: var(--gradient); border: none; color: #fff; }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 16px var(--accent-glow); }
        .btn-full { width: 100%; }
        .btn-sm { padding: 5px 8px; font-size: 11px; }
        .btn-group { display: flex; gap: 5px; }

        /* Render mode tabs */
        .tabs {
            display: flex; gap: 2px;
            background: var(--bg-primary); border-radius: 6px; padding: 2px;
        }
        .tab {
            flex: 1; padding: 5px 6px; font-size: 10px;
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; border-radius: 5px; transition: all 0.15s; font-family: inherit;
        }
        .tab.active { background: var(--accent); color: #fff; }

        /* Stats */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .stat {
            background: var(--bg-primary); border-radius: 6px;
            padding: 8px; text-align: center;
        }
        .stat-val { font-size: 16px; font-weight: 700; color: var(--accent-light); }
        .stat-lbl {
            font-size: 9px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px;
        }

        /* File upload */
        .upload {
            border: 2px dashed var(--border); border-radius: 6px;
            padding: 16px; text-align: center;
            cursor: pointer; transition: all 0.15s;
        }
        .upload:hover { border-color: var(--accent); background: rgba(99,102,241,0.04); }
        .upload input { display: none; }
        .upload p { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

        /* Control group */
        .ctrl { margin-bottom: 12px; }
        .ctrl label { display: block; font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }

        /* ====== VIEWPORT ====== */
        .viewport {
            position: fixed; top: 52px; left: 280px; right: 0; bottom: 0;
            background: var(--bg-primary);
        }
        #canvas3d { width: 100%; height: 100%; display: block; }

        /* Empty state */
        .empty {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
        }
        .empty svg { width: 72px; height: 72px; opacity: 0.2; margin-bottom: 14px; }
        .empty h2 { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        .empty p { font-size: 12px; color: var(--text-muted); max-width: 260px; }

        /* Loading */
        .loading {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 12px;
            background: rgba(8,8,16,0.92); z-index: 10;
        }
        .loading.hidden { display: none; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 13px; color: var(--text-secondary); }

        /* Toast */
        .toasts {
            position: fixed; bottom: 16px; right: 16px; z-index: 200;
            display: flex; flex-direction: column-reverse; gap: 6px;
        }
        .toast {
            padding: 10px 14px; border-radius: 6px; font-size: 12px;
            background: var(--bg-card); border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            animation: slideIn 0.25s ease;
            display: flex; align-items: center; gap: 6px; min-width: 220px;
        }
        @keyframes slideIn { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

        /* Export buttons section */
        .export-btns { display: flex; flex-wrap: wrap; gap: 4px; }
        .export-btns .btn { flex: 1; min-width: 60px; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="url(#hg)" stroke-width="2" stroke-linecap="round">
                <defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#a78bfa"/>
                </linearGradient></defs>
                <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
                <line x1="12" y1="22" x2="12" y2="12"/>
                <line x1="22" y1="8.5" x2="12" y2="12"/>
                <line x1="2" y1="8.5" x2="12" y2="12"/>
            </svg>
            <h1>MetaScan</h1>
            <span>3D Scanner</span>
        </div>
        <div class="header-right">
            <div class="conn-badge" id="connBadge">
                <div class="conn-dot"></div>
                <span id="connText">Sunucu Bagli Degil</span>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <!-- Server -->
        <div class="section">
            <h3>Sunucu</h3>
            <div class="ctrl">
                <button class="btn btn-primary btn-full" onclick="refreshSessions()">🔄 Oturumları Yenile</button>
            </div>
        </div>

        <!-- Sessions -->
        <div class="section">
            <h3>Tarama Oturumlari</h3>
            <div id="sessionList">
                <div class="session" style="text-align:center;color:var(--text-muted);font-size:11px;">Henüz tarama yapılmadı</div>
            </div>
        </div>

        <!-- File Upload -->
        <div class="section">
            <h3>Model Yukle</h3>
            <div class="upload" onclick="document.getElementById('fileIn').click()">
                <input type="file" id="fileIn" accept=".obj,.glb,.gltf,.ply,.stl" onchange="loadLocalFile(event)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="margin:0 auto;display:block;color:var(--text-muted);">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>OBJ, GLB, GLTF, PLY, STL</p>
            </div>
        </div>

        <!-- Render Controls -->
        <div class="section">
            <h3>Gorunum</h3>
            <div class="ctrl">
                <label>Render Modu</label>
                <div class="tabs">
                    <button class="tab active" data-mode="solid" onclick="setRenderMode('solid')">Solid</button>
                    <button class="tab" data-mode="wireframe" onclick="setRenderMode('wireframe')">Wire</button>
                    <button class="tab" data-mode="points" onclick="setRenderMode('points')">Point</button>
                    <button class="tab" data-mode="textured" onclick="setRenderMode('textured')">Texture</button>
                </div>
            </div>
            <div class="ctrl">
                <label>Arka Plan</label>
                <div class="tabs">
                    <button class="tab active" data-bg="dark" onclick="setBG('dark')">Koyu</button>
                    <button class="tab" data-bg="light" onclick="setBG('light')">Açık</button>
                    <button class="tab" data-bg="grid" onclick="setBG('grid')">Grid</button>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-sm btn-full" onclick="resetCamera()">🎯 Sıfırla</button>
                <button class="btn btn-sm btn-full" onclick="toggleAutoRotate()">🔄 Döndür</button>
            </div>
        </div>

        <!-- Export -->
        <div class="section" id="exportSection" style="display:none;">
            <h3>Disa Aktar</h3>
            <div class="export-btns" id="exportBtns"></div>
        </div>

        <!-- Stats -->
        <div class="section">
            <h3>Model Bilgileri</h3>
            <div class="stats">
                <div class="stat"><div class="stat-val" id="sVert">—</div><div class="stat-lbl">Vertices</div></div>
                <div class="stat"><div class="stat-val" id="sFace">—</div><div class="stat-lbl">Faces</div></div>
                <div class="stat"><div class="stat-val" id="sSize">—</div><div class="stat-lbl">Boyut (cm)</div></div>
                <div class="stat"><div class="stat-val" id="sFmt">—</div><div class="stat-lbl">Format</div></div>
            </div>
        </div>
    </aside>

    <!-- Viewport -->
    <div class="viewport" id="viewport">
        <canvas id="canvas3d"></canvas>

        <div class="empty" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                <line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
            <h2>3D Model Yükleyin</h2>
            <p>Bir tarama oturumu seçin veya dosya yükleyin</p>
        </div>

        <div class="loading hidden" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Model yükleniyor...</div>
        </div>
    </div>

    <div class="toasts" id="toasts"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r170/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/loaders/PLYLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/exporters/OBJExporter.js"></script>
    <script>
        // =================================================================
        // Scene Setup
        // =================================================================
        const canvas = document.getElementById('canvas3d');
        const viewport = document.getElementById('viewport');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 1000);
        camera.position.set(2, 1.5, 2);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const controls = new THREE.OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.rotateSpeed = 0.8;
        controls.panSpeed = 0.5;
        controls.zoomSpeed = 1.2;
        controls.autoRotateSpeed = 2.0;

        // Lighting
        scene.add(new THREE.AmbientLight(0x404060, 0.8));

        const dl1 = new THREE.DirectionalLight(0xffffff, 1.5);
        dl1.position.set(5, 8, 5);
        dl1.castShadow = true;
        scene.add(dl1);

        const dl2 = new THREE.DirectionalLight(0x8888ff, 0.6);
        dl2.position.set(-5, 3, -5);
        scene.add(dl2);

        scene.add(new THREE.HemisphereLight(0x6366f1, 0x1a1a28, 0.4));

        const gridHelper = new THREE.GridHelper(10, 20, 0x2a2a4a, 0x1a1a2e);
        gridHelper.visible = false;
        scene.add(gridHelper);

        let currentModel = null;
        let currentRenderMode = 'solid';
        const API = window.location.origin;

        // Resize
        function resize() {
            const r = viewport.getBoundingClientRect();
            camera.aspect = r.width / r.height;
            camera.updateProjectionMatrix();
            renderer.setSize(r.width, r.height);
        }
        window.addEventListener('resize', resize);
        resize();

        // Render loop
        (function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        })();

        // =================================================================
        // Model Loading
        // =================================================================
        function clearModel() {
            if (!currentModel) return;
            scene.remove(currentModel);
            currentModel.traverse(c => {
                if (c.geometry) c.geometry.dispose();
                if (c.material) {
                    (Array.isArray(c.material) ? c.material : [c.material]).forEach(m => m.dispose());
                }
            });
            currentModel = null;
        }

        function addModel(obj, fmt) {
            clearModel();

            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);

            obj.position.sub(center);
            obj.scale.multiplyScalar(2 / maxDim);

            obj.traverse(c => {
                if (c.isMesh) {
                    if (!c.material || c.material.type === 'MeshBasicMaterial') {
                        c.material = new THREE.MeshStandardMaterial({
                            color: 0x8888cc, roughness: 0.5, metalness: 0.1,
                        });
                    }
                    c.castShadow = true;
                    c.receiveShadow = true;
                }
            });

            scene.add(obj);
            currentModel = obj;

            camera.position.set(2, 1.5, 2);
            controls.target.set(0, 0, 0);
            controls.update();

            // Stats
            let verts = 0, faces = 0;
            obj.traverse(c => {
                if (c.isMesh && c.geometry) {
                    const g = c.geometry;
                    verts += g.attributes.position ? g.attributes.position.count : 0;
                    faces += g.index ? g.index.count / 3 : (g.attributes.position ? g.attributes.position.count / 3 : 0);
                }
            });

            document.getElementById('sVert').textContent = fmtNum(verts);
            document.getElementById('sFace').textContent = fmtNum(Math.floor(faces));
            document.getElementById('sSize').textContent = (maxDim * 100).toFixed(1);
            document.getElementById('sFmt').textContent = fmt.toUpperCase();

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('loadingOverlay').classList.add('hidden');

            setRenderMode(currentRenderMode);
            showExportButtons();
            toast(`✅ Model yüklendi: ${fmtNum(verts)} vertex`, 'success');
        }

        function loadFromURL(url, fmt) {
            showLoading('Model yükleniyor...');
            const onErr = (e) => { hideLoading(); toast('❌ Yükleme hatası: ' + e.message, 'error'); };
            const onProg = () => {};

            switch (fmt) {
                case 'obj':
                    new THREE.OBJLoader().load(url, o => addModel(o, 'OBJ'), onProg, onErr);
                    break;
                case 'glb': case 'gltf':
                    new THREE.GLTFLoader().load(url, g => addModel(g.scene, 'GLB'), onProg, onErr);
                    break;
                case 'ply':
                    new THREE.PLYLoader().load(url, geo => {
                        geo.computeVertexNormals();
                        const mat = new THREE.MeshStandardMaterial({
                            color: 0x8888cc, roughness: 0.5, metalness: 0.1,
                            vertexColors: geo.hasAttribute('color'),
                        });
                        addModel(new THREE.Mesh(geo, mat), 'PLY');
                    }, onProg, onErr);
                    break;
                case 'stl':
                    new THREE.STLLoader().load(url, geo => {
                        geo.computeVertexNormals();
                        const mat = new THREE.MeshStandardMaterial({
                            color: 0x8888cc, roughness: 0.5, metalness: 0.1,
                        });
                        addModel(new THREE.Mesh(geo, mat), 'STL');
                    }, onProg, onErr);
                    break;
            }
        }

        function loadLocalFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            const url = URL.createObjectURL(file);
            loadFromURL(url, ext);
        }

        // =================================================================
        // Render Modes
        // =================================================================
        function setRenderMode(mode) {
            currentRenderMode = mode;
            document.querySelectorAll('.tab[data-mode]').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === mode);
            });

            if (!currentModel) return;
            currentModel.traverse(c => {
                if (!c.isMesh) return;
                switch (mode) {
                    case 'solid':
                        c.material.wireframe = false;
                        c.material.opacity = 1;
                        c.material.transparent = false;
                        c.visible = true;
                        break;
                    case 'wireframe':
                        c.material.wireframe = true;
                        c.visible = true;
                        break;
                    case 'points':
                        c.material.wireframe = false;
                        c.material.opacity = 0.2;
                        c.material.transparent = true;
                        c.visible = true;
                        break;
                    case 'textured':
                        c.material.wireframe = false;
                        c.material.opacity = 1;
                        c.material.transparent = false;
                        c.visible = true;
                        break;
                }
            });
        }

        function setBG(mode) {
            document.querySelectorAll('.tab[data-bg]').forEach(b => {
                b.classList.toggle('active', b.dataset.bg === mode);
            });

            switch (mode) {
                case 'dark':
                    renderer.setClearColor(0x080810, 1);
                    gridHelper.visible = false;
                    break;
                case 'light':
                    renderer.setClearColor(0xd0d0d8, 1);
                    gridHelper.visible = false;
                    break;
                case 'grid':
                    renderer.setClearColor(0x080810, 1);
                    gridHelper.visible = true;
                    break;
            }
        }

        function resetCamera() {
            camera.position.set(2, 1.5, 2);
            controls.target.set(0, 0, 0);
            controls.update();
        }

        function toggleAutoRotate() {
            controls.autoRotate = !controls.autoRotate;
            toast(controls.autoRotate ? '🔄 Otomatik döndürme açık' : '🔄 Otomatik döndürme kapalı');
        }

        // =================================================================
        // Export
        // =================================================================
        function showExportButtons() {
            const sec = document.getElementById('exportSection');
            const btns = document.getElementById('exportBtns');
            sec.style.display = 'block';
            btns.innerHTML = `
                <button class="btn btn-sm" onclick="exportModel('stl')">📦 STL</button>
                <button class="btn btn-sm" onclick="exportModel('obj')">📦 OBJ</button>
            `;
        }

        function exportModel(format) {
            if (!currentModel) { toast('❌ Model yüklenmedi', 'error'); return; }

            let data, filename, mimeType;

            if (format === 'stl') {
                const exporter = new THREE.STLExporter();
                data = exporter.parse(currentModel, { binary: true });
                filename = 'metascan_model.stl';
                mimeType = 'application/octet-stream';
                downloadBlob(new Blob([data], { type: mimeType }), filename);
            } else if (format === 'obj') {
                const exporter = new THREE.OBJExporter();
                data = exporter.parse(currentModel);
                filename = 'metascan_model.obj';
                mimeType = 'text/plain';
                downloadBlob(new Blob([data], { type: mimeType }), filename);
            }

            toast(`📥 ${format.toUpperCase()} indirildi`, 'success');
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // =================================================================
        // Sessions API
        // =================================================================
        async function refreshSessions() {
            try {
                const res = await fetch(API + '/api/sessions');
                const data = await res.json();

                // Update connection status
                const badge = document.getElementById('connBadge');
                const text = document.getElementById('connText');
                badge.classList.add('connected');
                text.textContent = 'Sunucu Bağlı';

                const list = document.getElementById('sessionList');
                if (!data.sessions || data.sessions.length === 0) {
                    list.innerHTML = '<div class="session" style="text-align:center;color:var(--text-muted);font-size:11px;">Henüz tarama yapılmadı</div>';
                    return;
                }

                list.innerHTML = data.sessions.map(s => `
                    <div class="session" onclick="selectSession('${s.session_id}')">
                        <div class="name">${s.session_id}</div>
                        <div class="meta">${s.frame_count} frame${s.duration ? ' • ' + s.duration + 's' : ''}</div>
                    </div>
                `).join('');

                toast('✅ ' + data.sessions.length + ' oturum bulundu');
            } catch (e) {
                const badge = document.getElementById('connBadge');
                const text = document.getElementById('connText');
                badge.classList.remove('connected');
                text.textContent = 'Sunucu Bağlı Değil';
                toast('❌ Sunucu bağlantısı başarısız', 'error');
            }
        }

        async function selectSession(id) {
            document.querySelectorAll('.session').forEach(s => s.classList.remove('active'));
            event.currentTarget.classList.add('active');

            try {
                const res = await fetch(API + '/api/sessions/' + id + '/exports');
                const data = await res.json();

                if (data.exports && data.exports.length > 0) {
                    // Load first available model
                    const model = data.exports[0];
                    const ext = model.filename.split('.').pop().toLowerCase();
                    loadFromURL(API + model.url, ext);

                    // Show download links for all exports
                    const sec = document.getElementById('exportSection');
                    const btns = document.getElementById('exportBtns');
                    sec.style.display = 'block';
                    btns.innerHTML = data.exports.map(e =>
                        `<a class="btn btn-sm" href="${API}${e.url}" download>📥 ${e.format} (${e.size_mb}MB)</a>`
                    ).join('');
                } else {
                    toast('⚠️ Bu oturum için henüz export yok. Reconstruction başlatın.', 'warning');

                    // Offer reconstruction
                    const sec = document.getElementById('exportSection');
                    const btns = document.getElementById('exportBtns');
                    sec.style.display = 'block';
                    btns.innerHTML = `<button class="btn btn-primary btn-full" onclick="startReconstruction('${id}')">🔧 3D Model Oluştur</button>`;
                }
            } catch (e) {
                toast('❌ Oturum bilgileri alınamadı', 'error');
            }
        }

        async function startReconstruction(id) {
            try {
                await fetch(API + '/api/sessions/' + id + '/reconstruct?method=full', { method: 'POST' });
                toast('🔧 Reconstruction başlatıldı...', 'info');
                pollReconstruction(id);
            } catch (e) {
                toast('❌ Reconstruction başlatılamadı', 'error');
            }
        }

        async function pollReconstruction(id) {
            const check = async () => {
                try {
                    const res = await fetch(API + '/api/sessions/' + id + '/reconstruction/status');
                    const data = await res.json();

                    if (data.status === 'completed') {
                        toast('✅ 3D model oluşturuldu!', 'success');
                        selectSession(id);
                    } else if (data.status === 'failed') {
                        toast('❌ Reconstruction başarısız: ' + (data.error || ''), 'error');
                    } else if (data.status === 'running') {
                        setTimeout(check, 3000);
                    }
                } catch (e) { /* ignore polling errors */ }
            };
            setTimeout(check, 3000);
        }

        // =================================================================
        // Utilities
        // =================================================================
        function fmtNum(n) {
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return n.toString();
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text || 'Yükleniyor...';
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = 'toast';
            el.style.borderLeftColor = type === 'error' ? 'var(--error)' :
                type === 'success' ? 'var(--success)' :
                type === 'warning' ? 'var(--warning)' : 'var(--accent)';
            el.style.borderLeftWidth = '3px';
            el.style.borderLeftStyle = 'solid';
            el.textContent = msg;
            document.getElementById('toasts').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        // Initial background
        setBG('dark');
    </script>
</body>
</html>
